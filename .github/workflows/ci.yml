# 契約テストを回す。
# macos ランナーを使うのは、実運用環境 (macOS ホスト) と BSD ツール群を
# 揃えるため。外部コマンドはハーネスがフェイクするため gh 等は不要。
name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  contract:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Contract tests
        run: cargo test --test contract
